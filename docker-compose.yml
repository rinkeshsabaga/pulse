version: '3.8'

services:
  web:
    build: .
    restart: always
    env_file:
      - .env.production
    expose:
      - "3000"

  # Caddy acts as a reverse proxy and automatically provisions HTTPS via Let's Encrypt
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
